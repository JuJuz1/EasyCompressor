# IMPORTANT: H264 and H265 are the only codecs currently supported
# Use the app to set the default output path, it's much easier that way!

# You can specify up to 5 preset sizes the app loads when it starts, only the first 5 are used
# Append ! after a value to signal it as the default value
# Note that the min and max values are 0.5 and 5000.0. Values outside this range are clamped

[Sizes]
5.0
10.0 !
25.0
50.0
100.0

[Codecs]
h264 !
h265

# Has to be an absolute path
[OutputPath]
